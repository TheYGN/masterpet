<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>MasterPet — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200" rel="stylesheet">
<style>
  :root {
    --primary: #1B5E20;
    --primary-container: #B7F0BB;
    --on-primary: #fff;
    --surface: #FAFAFA;
    --surface-container: #EFF2EC;
    --surface-container-low: #F5F7F1;
    --on-surface: #191D17;
    --on-surface-variant: #43483F;
    --outline-variant: #C3C8BC;
    --sidebar-width: 240px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: 'Heebo', system-ui, sans-serif; background: var(--surface); color: var(--on-surface); }

  /* ── Layout ── */
  .shell { display: flex; height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-width);
    flex-shrink: 0;
    background: var(--surface-container-low);
    border-left: 1px solid var(--outline-variant);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--outline-variant);
  }
  .brand-icon {
    width: 36px; height: 36px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brand-icon svg { width: 20px; height: 20px; fill: #fff; }
  .brand-text { font-size: 17px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
  .brand-sub { font-size: 11px; color: var(--on-surface-variant); font-weight: 400; margin-top: 1px; }

  /* Demo badge */
  .demo-badge {
    margin: 10px 16px;
    background: var(--primary-container);
    color: var(--primary);
    font-size: 11px;
    font-weight: 600;
    border-radius: 20px;
    padding: 4px 10px;
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* Nav sections */
  .nav-section { padding: 8px 0; }
  .nav-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--on-surface-variant);
    padding: 6px 16px 4px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    font-size: 14px;
    font-weight: 500;
    color: var(--on-surface);
    position: relative;
    user-select: none;
  }
  .nav-item:hover { background: rgba(27,94,32,0.08); }
  .nav-item.active {
    background: var(--primary-container);
    color: var(--primary);
    font-weight: 600;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    right: 0; top: 4px; bottom: 4px;
    width: 3px;
    background: var(--primary);
    border-radius: 3px 0 0 3px;
  }
  .nav-item .ms {
    font-family: 'Material Symbols Outlined';
    font-size: 20px;
    font-weight: normal;
    font-style: normal;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: 'liga';
    font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
    opacity: 0.7;
    flex-shrink: 0;
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
  }
  .nav-item.active .ms {
    font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 20;
    opacity: 1;
  }

  .nav-sub {
    padding-right: 16px;
  }
  .nav-sub .nav-item {
    padding-right: 42px;
    font-size: 13px;
    font-weight: 400;
  }
  .nav-sub .nav-item::after {
    content: '';
    position: absolute;
    right: 28px; top: 50%;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--outline-variant);
    transform: translateY(-50%);
  }
  .nav-sub .nav-item.active::after { background: var(--primary); }

  /* ── Main content ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Top bar */
  .topbar {
    height: 48px;
    background: var(--surface-container-low);
    border-bottom: 1px solid var(--outline-variant);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 8px;
    flex-shrink: 0;
  }
  .topbar-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--on-surface-variant);
    flex: 1;
  }
  .topbar-breadcrumb {
    font-size: 13px;
    color: var(--on-surface-variant);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .topbar-breadcrumb .sep { opacity: 0.4; font-size: 16px; }
  .topbar-breadcrumb .current { color: var(--primary); font-weight: 600; }

  .btn-link {
    font-size: 12px;
    font-weight: 500;
    color: var(--primary);
    background: none;
    border: 1px solid var(--outline-variant);
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 120ms;
  }
  .btn-link:hover { background: var(--primary-container); }

  /* iframe */
  #frame {
    flex: 1;
    width: 100%;
    border: none;
    background: var(--surface);
  }

  /* Loading overlay */
  .loading-overlay {
    position: absolute;
    inset: 48px 0 0 0;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 150ms;
    z-index: 10;
  }
  .loading-overlay.visible { opacity: 1; pointer-events: all; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--outline-variant);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label { font-size: 13px; color: var(--on-surface-variant); }

  /* Welcome screen (shown before any page is selected) */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px;
    display: none;
  }
  .welcome.active { display: flex; }
</style>
</head>
<body>
<div class="shell">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="8" cy="9" rx="2.5" ry="3.5"/>
          <ellipse cx="5" cy="5.5" rx="2" ry="3"/>
          <ellipse cx="11" cy="5.5" rx="2" ry="3"/>
          <ellipse cx="14" cy="8.5" rx="2" ry="3"/>
          <path d="M 6 13 C 6 10, 12 10, 12 13 C 12 17, 9.5 18.5, 9 18.5 C 8.5 18.5, 6 17, 6 13 Z"/>
        </svg>
      </div>
      <div>
        <div class="brand-text">MasterPet</div>
        <div class="brand-sub">ניהול לעסקי מזון לחיות</div>
      </div>
    </div>

    <div class="demo-badge">Demo Mode</div>

    <div class="nav-section">
      <div class="nav-section-label">כללי</div>
      <div class="nav-item active" data-src="MasterPet Dashboard (standalone).html" data-label="דשבורד" onclick="navigate(this)">
        <span class="ms">dashboard</span>
        דשבורד
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">מוצרים</div>
      <div class="nav-item" data-src="designs/products-list/MasterPet Products List.html" data-label="קטלוג מוצרים" onclick="navigate(this)">
        <span class="ms">inventory_2</span>
        קטלוג מוצרים
      </div>
      <div class="nav-sub">
        <div class="nav-item" data-src="designs/product-sheet/MasterPet Product Sheet.html" data-label="גיליון מוצר" onclick="navigate(this)">
          גיליון מוצר
        </div>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">הזמנות</div>
      <div class="nav-item" data-src="designs/orders-list/MasterPet Orders List.html" data-label="ניהול הזמנות" onclick="navigate(this)">
        <span class="ms">receipt_long</span>
        רשימת הזמנות
      </div>
      <div class="nav-sub">
        <div class="nav-item" data-src="designs/order-detail/MasterPet Order Detail.html" data-label="פרטי הזמנה" onclick="navigate(this)">
          פרטי הזמנה
        </div>
        <div class="nav-item" data-src="designs/order-inbox/MasterPet Order Inbox.html" data-label="תיבת הזמנות" onclick="navigate(this)">
          תיבת הזמנות
        </div>
        <div class="nav-item" data-src="designs/order-sheet/MasterPet Order Sheet.html" data-label="גיליון הזמנה" onclick="navigate(this)">
          גיליון הזמנה
        </div>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">לקוחות</div>
      <div class="nav-item" data-src="designs/customers-list/MasterPet Customers List.html" data-label="רשימת לקוחות" onclick="navigate(this)">
        <span class="ms">groups</span>
        רשימת לקוחות
      </div>
      <div class="nav-sub">
        <div class="nav-item" data-src="designs/customer-card/MasterPet Customer Card.html" data-label="כרטיס לקוח" onclick="navigate(this)">
          כרטיס לקוח
        </div>
        <div class="nav-item" data-src="designs/customer-sheet/MasterPet Customer Sheet.html" data-label="גיליון לקוח" onclick="navigate(this)">
          גיליון לקוח
        </div>
      </div>
    </div>

  </nav>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-breadcrumb">
        <span>MasterPet</span>
        <span class="sep">›</span>
        <span class="current" id="breadcrumb">דשבורד</span>
      </div>
      <div style="flex:1"></div>
      <button class="btn-link" onclick="openInTab()">פתח בלשונית</button>
    </div>

    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div class="loading-label">טוען מסך...</div>
    </div>

    <iframe id="frame" src="MasterPet Dashboard (standalone).html"></iframe>
  </div>

</div>

<script>
  let currentSrc = 'MasterPet Dashboard (standalone).html';
  const frame = document.getElementById('frame');
  const loading = document.getElementById('loading');
  const breadcrumb = document.getElementById('breadcrumb');

  function navigate(el) {
    const src = el.dataset.src;
    const label = el.dataset.label;
    if (src === currentSrc) return;

    // Update active state
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');

    // Show loading
    loading.classList.add('visible');
    breadcrumb.textContent = label || el.textContent.trim();
    currentSrc = src;

    // Load frame
    frame.src = src;
  }

  frame.addEventListener('load', () => {
    loading.classList.remove('visible');
  });

  function openInTab() {
    window.open(currentSrc, '_blank');
  }
</script>
</body>
</html>
